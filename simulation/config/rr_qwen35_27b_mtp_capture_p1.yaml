# ============================================================
# Pass 1 — Qwen3.5-27B (dense) native MTP capture, TP=4 GPU 0-3,
#          specbench + bfcl_v4 (qwen25 parser).
# 27B dense: 54GB BF16 / 4 = 13.5GB/GPU — much better than 35B
# on 4090 24GB. Higher mem_fraction + ctx feasible.
# ============================================================
name: rr_qwen35_27b_mtp_capture_p1

model_preset: qwen35_27b_mtp

stage1_steps: 8
stage1_configs:
  - topk: 8
    num_draft_tokens: 16

round_robin:
  enabled: true
  capture_full_pool: true
  batch: 1
  resume: true
  context_length: 131072

mem_fraction_static: 0.85
max_prefill_tokens: 4096

max_per_workload: 20

workloads:
  - specbench
  - bfcl_v4

workload_overrides:
  specbench:
    max_tokens_override: 8192
  bfcl_v4:
    max_iterations: 20
    include_category: web_search

shards:
  - id: 0
    gpu_ids: [0, 1, 2, 3]
    port: 30006
    workloads: [specbench, bfcl_v4]
    tool_call_parser: qwen25

infra:
  port: 30006
  gpu_ids: [0, 1, 2, 3]

output:
  root: simulation/results
